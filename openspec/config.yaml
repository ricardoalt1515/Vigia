# OpenSpec configuration for Vigía.
# Generated by SDD init. Technical artifacts are kept in English.
project:
  name: vigia
  repository: github.com/ricardoalt1515/vigia
  summary: >-
    Collections compliance control plane for Mexico. The product evaluates debt-collection
    interactions against REDECO/CONDUSEF rules, escalates or blocks risky behavior in later
    phases, and produces a regulator-ready evidence ledger.
  status: pre-build scaffold; planning docs and empty Go module are present
  artifact_store: openspec
  primary_language: Go
  backend:
    module: github.com/ricardoalt1515/vigia
    go_version: "1.26"
    architecture: workflow-first compliance engine with ports/adapters boundaries
  planned_frontend:
    framework: Next.js App Router
    language: TypeScript
  local_development:
    services:
      - PostgreSQL via docker-compose
      - MinIO/S3-compatible object storage with Object Lock intent
    commands:
      start: make dev
      stop: make down
      logs: make logs

sdd:
  initialized_at: "2026-06-28"
  execution_mode: interactive
  artifact_store: openspec
  chained_pr_strategy: ask-on-risk
  review_budget_lines: 400
  strict_tdd: true
  phase_rules:
    init:
      - Preserve existing uncommitted user changes.
      - Only write minimal SDD initialization artifacts.
    propose:
      - Keep artifacts in English unless explicitly requested otherwise.
      - Respect the current issue order and do not widen implementation scope.
    spec:
      - Capture acceptance criteria before implementation.
      - Preserve existing architecture decisions unless explicitly changed.
    design:
      - Use workflow-first compliance authority; do not turn the Shadow Mode core into an autonomous agent loop.
      - Keep MCP as an external AI-client integration surface, not the internal harness runtime.
      - Keep Judge and Harness model ports separate.
      - Keep Bedrock opt-in only; do not use Bedrock in default tests or demos.
    tasks:
      - Forecast review workload against the 400 changed-line budget.
      - Start later implementation with issue #13 only.
    apply:
      - Strict TDD is active for implementation phases.
      - Add or update behavior-focused tests before production code where a meaningful test can be written.
      - For detectors and judge/rubric changes, author golden cases before or with the implementation, never after.
      - Do not add tests that merely restate implementation details.
    verify:
      - Run focused verification for the changed slice and the broader Go suite when packages exist.
      - Report test-command limitations explicitly when the repository has no Go packages yet.

scope_constraints:
  do_not:
    - Do not commit, push, or create pull requests.
    - Do not implement issue #13 or any code during initialization.
    - Do not implement issue #17 before issue #14.
    - Do not implement issue #1 before issues #13 and #14.
    - Do not make MCP the internal Harness runtime.
    - Do not merge Judge and Harness model ports.
    - Do not make Bedrock a default path for tests or demos.
  implementation_order:
    next_issue: "#13 dev environment and bootstrap"
    parent_epic: "#16 remains parent for #18 -> #19 -> #20 -> #21 -> #22"
    dependency_notes:
      - "#16 Agent Harness Lab follows #13 and remains sandboxed/read-only/draft-only until later phases."
      - "#14 tenant auth/RLS is required before #17 external Remote MCP."
      - "#1 thin walking skeleton waits for #13 and #14."

testing:
  capability: detected
  runner: go test
  command: go test ./...
  make_target: make test
  current_repository_state: >-
    The Go toolchain is available, but the repository currently has no Go packages,
    so `go test ./...` exits with "matched no packages" until implementation begins.
  strict_tdd: true
  evidence:
    - go.mod declares module github.com/ricardoalt1515/vigia with Go 1.26.
    - Makefile defines `test: go test ./...`.
    - docs/technical-design.md requires Go table-driven tests, golden-set CI, and TDD for detector/judge work.
    - docs/build-plan.md requires golden-set-first TDD for detectors.

conventions:
  architecture:
    - Prefer clean/hexagonal boundaries with domain logic independent from infrastructure.
    - Use small ports by use case; avoid broad generic model-provider abstractions.
    - Keep untrusted transcripts as data, never instructions.
  testing:
    - Prefer table-driven Go tests for multiple cases.
    - Test behavior and state transitions, not implementation trivia.
    - Use t.TempDir for filesystem tests.
    - Keep integration tests skippable with testing.Short when they need external services.
  review:
    - Keep work units reviewable and monitor the 400-line review budget.
    - Preserve tests/docs with the behavior they verify or explain.

skill_registry:
  path: .atl/skill-registry.md
  status: present
