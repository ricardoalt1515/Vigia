summary: >-
  Graduate the sandboxed Agent Harness Lab (#16) into authority-bearing realtime
  guardrails. Route proposed outbound agent utterances through the policy engine
  before send, hard-blocking or rerouting violations of REDECO rules. Add a campaign
  preflight simulator that validates scripts/templates/sequences against the ruleset
  and flags violations before launch.

acceptance_criteria:
  - A threatening or out-of-hours outbound utterance is blocked before send.
  - A blocked action is logged with the violated rule and reaches the evidence ledger.
  - The preflight simulator flags a non-compliant campaign template prior to launch.
  - A compliant utterance and campaign pass without blocking.
  - Authority-bearing tools reuse the #16 permission-gate/event-log contract.
