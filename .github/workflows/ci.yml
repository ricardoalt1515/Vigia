name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: Build, test, and golden eval
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: vigia
          POSTGRES_PASSWORD: vigia
          POSTGRES_DB: vigia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vigia -d vigia"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://vigia:vigia@localhost:5432/vigia?sslmode=disable
      APP_DATABASE_URL: postgres://vigia_app:vigia_app@localhost:5432/vigia?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Apply database migrations
        run: make migrate-up

      - name: Build
        run: make build

      - name: Run tests
        run: go test ./...

      - name: Run golden-set eval gate
        run: make eval-golden
