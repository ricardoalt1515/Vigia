# Local dev stack for Vigía. Start with `make dev`.
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: vigia
      POSTGRES_PASSWORD: vigia
      POSTGRES_DB: vigia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigia"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible object storage with Object Lock (WORM) for audio evidence.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vigia
      MINIO_ROOT_PASSWORD: vigia-secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
