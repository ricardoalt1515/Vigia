# Local dev stack for Vigía. Start with `make dev`.
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: vigia
      POSTGRES_PASSWORD: vigia
      POSTGRES_DB: vigia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigia"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible local object storage for readiness only; #13 does not
  # enforce Object Lock, bucket lifecycle, audio evidence, or WORM semantics.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vigia
      MINIO_ROOT_PASSWORD: vigia-secret
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # console
    volumes:
      - miniodata:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:9000/minio/health/live || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  miniodata:
